<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Upload — Zoho Creator</title>
  <link rel="stylesheet" href="audio-upload.css">
</head>
<body>
<form class="form-table label-left">

    <!-- With help text -->
    <div class="form-group form-fileupload-field clearfix zc-Audio-group">
      <label for="zc-Audio" id="zc-Audio-arialabel" class="form-label zc-dem-clearfix zc-Audio-label zc_audio_label">
        <span class="zc-label-text">Audio</span>
      </label>
      <div class="form-field clearfix mediumSizeLive">
        <input name="Audio" type="hidden">
        <div class="local-fileupload zc-audio-fld zc-uploadComponents clearfix">
          <div class="zc-file-upload single">
            <div class="filedrag">
              <div class="zc-image-hover-msg zc-dem-text-ellipsis">Select File</div>
              <input id="zc-Audio_FILE" class="textfield zc-elem-focus-field" name="uploadFile" duration="60" accept="audio/*" type="file" aria-labelledby="zc-Audio-arialabel" aria-describedby="zc-Audio-helpText zc-Audio-errorMsg">
            </div>
            <ul class="filename"></ul>
          </div>
          <div class="zc-dem-clearfix zc-image-icons" style="z-index: 1;">
            <span tabindex="0" class="calcIcon restoreIcon hide zc-elem-focus-field" role="button" aria-label="Audio Restore"><i class="zc-li-outline arrows-4-undo-29"></i></span>
            <span tabindex="-1" class="calcIcon uploadIcon zc-elem-focus-field" title="Local Computer" role="button" aria-label="Audio Local Computer"><i class="zc-li-outline arrows-2-square-upload"></i></span>
            <span tabindex="0" class="calcIcon audioIcon zc-elem-focus-field" title="Microphone" role="button" aria-label="Audio Microphone"><i class="zc-li-outline media-1-audio-91"></i></span>
          </div>
        </div>
        <div id="zc-Audio-helpText" class="zc-help-txt">Help text goes here</div>
      </div>
    </div>

    <!-- Error state -->
    <div class="form-group form-fileupload-field clearfix zc-Audio_Err-group">
      <label for="zc-Audio_Err" id="zc-Audio_Err-arialabel" class="form-label zc-dem-clearfix zc-Audio_Err-label zc_audio_label">
        <span class="zc-label-text">Audio<span class="fieldMandate" aria-hidden="true">*</span></span>
      </label>
      <div class="form-field clearfix mediumSizeLive validationError">
        <input name="Audio_Err" type="hidden">
        <div class="local-fileupload zc-audio-fld zc-uploadComponents clearfix">
          <div class="zc-file-upload single">
            <div class="filedrag">
              <div class="zc-image-hover-msg zc-dem-text-ellipsis">Select File</div>
              <input id="zc-Audio_Err_FILE" class="textfield zc-elem-focus-field" name="uploadFile" duration="60" accept="audio/*" type="file" aria-labelledby="zc-Audio_Err-arialabel" aria-describedby="zc-Audio_Err-errorMsg">
            </div>
            <ul class="filename"></ul>
          </div>
          <div class="zc-dem-clearfix zc-image-icons" style="z-index: 1;">
            <span tabindex="0" class="calcIcon restoreIcon hide zc-elem-focus-field" role="button" aria-label="Audio Restore"><i class="zc-li-outline arrows-4-undo-29"></i></span>
            <span tabindex="-1" class="calcIcon uploadIcon zc-elem-focus-field" title="Local Computer" role="button" aria-label="Audio Local Computer"><i class="zc-li-outline arrows-2-square-upload"></i></span>
            <span tabindex="0" class="calcIcon audioIcon zc-elem-focus-field" title="Microphone" role="button" aria-label="Audio Microphone"><i class="zc-li-outline media-1-audio-91"></i></span>
          </div>
        </div>
        <div id="zc-Audio_Err-errorMsg" class="fieldErrorMsg" role="alert">
          <span>This field is mandatory. Upload a file.</span>
        </div>
      </div>
    </div>

    <!-- Disabled state -->
    <div class="form-group form-fileupload-field clearfix zc-Audio_Dis-group zc-field-disabled">
      <label for="zc-Audio_Dis" id="zc-Audio_Dis-arialabel" class="form-label zc-dem-clearfix zc-Audio_Dis-label zc_audio_label">
        <span class="zc-label-text">Audio</span>
      </label>
      <div class="form-field clearfix mediumSizeLive">
        <input name="Audio_Dis" type="hidden">
        <div class="local-fileupload zc-audio-fld zc-uploadComponents clearfix">
          <div class="zc-file-upload single">
            <div class="filedrag">
              <div class="zc-image-hover-msg zc-dem-text-ellipsis">Select File</div>
              <input id="zc-Audio_Dis_FILE" class="textfield zc-elem-focus-field" name="uploadFile" duration="60" accept="audio/*" type="file" aria-labelledby="zc-Audio_Dis-arialabel" disabled>
            </div>
            <ul class="filename"></ul>
          </div>
          <div class="zc-dem-clearfix zc-image-icons" style="z-index: 1;">
            <span tabindex="0" class="calcIcon restoreIcon hide zc-elem-focus-field" role="button" aria-label="Audio Restore"><i class="zc-li-outline arrows-4-undo-29"></i></span>
            <span tabindex="-1" class="calcIcon uploadIcon zc-elem-focus-field" title="Local Computer" role="button" aria-label="Audio Local Computer"><i class="zc-li-outline arrows-2-square-upload"></i></span>
            <span tabindex="0" class="calcIcon audioIcon zc-elem-focus-field" title="Microphone" role="button" aria-label="Audio Microphone"><i class="zc-li-outline media-1-audio-91"></i></span>
          </div>
        </div>
      </div>
    </div>

</form>
</body>
</html>
