<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Input — Zoho Creator</title>
  <link rel="stylesheet" href="currency-input.css">
</head>
<body>
<form class="form-table label-left">

    <!-- With help text -->
    <div class="form-group clearfix">
      <label class="form-label" for="zc-currency">
        <span class="zc-label-text">Currency</span>
      </label>
      <div class="form-field mediumSizeLive clearfix zc-currency-field">
        <input class="form-control zc-numberfield" type="text" name="Currency" id="zc-currency" placeholder="#,###,###.##" inputmode="decimal" aria-describedby="zc-currency-help">
        <div id="zc-currency-help" class="zc-help-txt">Help text goes here</div>
      </div>
    </div>

    <!-- Error state -->
    <div class="form-group clearfix">
      <label class="form-label" for="zc-currency-err">
        <span class="zc-label-text">Currency<span class="fieldMandate" aria-hidden="true">*</span></span>
      </label>
      <div class="form-field mediumSizeLive clearfix zc-currency-field validationError">
        <input class="form-control zc-numberfield" type="text" name="Currency_Err" id="zc-currency-err" placeholder="#,###,###.##" inputmode="decimal" required aria-required="true" aria-invalid="true" aria-describedby="zc-currency-error">
        <div id="zc-currency-error" class="fieldErrorMsg" role="alert">
          <span>This field is mandatory. Enter a value.</span>
        </div>
      </div>
    </div>

    <!-- Disabled state -->
    <div class="form-group clearfix zc-field-disabled">
      <label class="form-label" for="zc-currency-dis">
        <span class="zc-label-text">Currency</span>
      </label>
      <div class="form-field mediumSizeLive clearfix zc-currency-field">
        <input class="form-control zc-numberfield" type="text" name="Currency_Dis" id="zc-currency-dis" placeholder="Disabled" inputmode="decimal" disabled aria-disabled="true">
      </div>
    </div>

</form>
</body>
</html>
