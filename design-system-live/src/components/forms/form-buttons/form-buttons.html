<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Buttons — Zoho Creator</title>
  <link rel="stylesheet" href="form-buttons.css">
</head>
<body>

    <div class="zc-footer-wrapper">
      <div class="zc-form-footer">
        <div class="form-action-container">
          <div class="form-action formbutton" role="group" aria-label="Form actions">
            <input class="zc-live-primary-btn" type="submit" aria-label="Submit" name="submit" value="Submit" title="">
            <input class="zc-live-secondary-btn zc-draft-btn" type="button" role="button" aria-label="Save as Draft" name="draft-button" value="Save as Draft">
            <input class="zc-live-secondary-btn" type="reset" aria-label="Reset" name="reset" value="Reset" title="">
          </div>
        </div>
      </div>
    </div>

</body>
</html>
