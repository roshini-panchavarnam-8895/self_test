                    borderRadius: 12, overflow: "hidden", transition: "all 0.25s",
                    animation: `fadeUp 0.25s ease ${i * 0.06}s both`,
                  }}>
                    <button onClick={() => setExpandedProduct(isOpen ? null : p.name)} style={{
                      width: "100%", display: "flex", alignItems: "center", gap: 10,
                      padding: "12px 14px", background: "transparent", border: "none",
                      cursor: "pointer", textAlign: "left",
                    }}>
                      <span style={{ fontSize: 24 }}>{p.icon}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: isOpen ? p.color : "#B8B8D0" }}>{p.name}</div>
                        <div style={{ fontSize: 10.5, color: "#55557A" }}>{p.desc}</div>
                      </div>
                      <span style={{
                        color: "#44445A", fontSize: 14, transition: "transform 0.25s",
                        transform: isOpen ? "rotate(90deg)" : "rotate(0)",
                      }}>▶</span>
                    </button>
                    {isOpen && (
                      <div style={{ padding: "0 14px 14px", animation: "expandIn 0.2s ease" }}>
                        {p.mapping.map((m, j) => (
                          <div key={j} style={{
                            display: "flex", alignItems: "flex-start", gap: 8,
                            padding: "7px 0",
                            borderTop: j > 0 ? "1px solid #14142A" : "none",
                          }}>
                            <span style={{
                              fontSize: 10.5, fontWeight: 700, background: "#141428",
                              borderRadius: 5, padding: "2px 7px", whiteSpace: "nowrap",
                              color: "#8888A4", flexShrink: 0,
                            }}>{m.piece}</span>
                            <span style={{ fontSize: 12, color: "#AAAAC4" }}>{m.what}</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{
              marginTop: 14, background: "#845EF70A", borderRadius: 12,
              padding: "12px 14px", border: "1px solid #845EF718",
            }}>
              <p style={{ fontSize: 12, lineHeight: 1.6, color: "#9898B0", margin: 0 }}>
                <span style={{ fontWeight: 700, color: "#B8A4F8" }}>Pattern:</span> Notice how <strong style={{ color: "#CCCCE0" }}>Augment Code</strong> and <strong style={{ color: "#CCCCE0" }}>Cursor</strong> both use the same blocks but Augment bets heavily on deep RAG (understanding massive codebases), while Cursor leans into agent mode for multi-file edits. Same Legos, different strategy.
              </p>
            </div>
          </div>
        )}

        {/* ─── BONUS ─── */}
        {activeTab === "bonus" && (
          <div>
            <div style={{ textAlign: "center", marginBottom: 16 }}>
              <h2 style={{ fontSize: 18, fontWeight: 800, color: "#845EF7", margin: "0 0 4px" }}>
                Bonus Concepts Worth Knowing
              </h2>
              <p style={{ color: "#55557A", fontSize: 12, margin: 0 }}>Level up your AI vocabulary</p>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {bonusConcepts.map((b, i) => {
                const isOpen = expandedBonus === i;
                return (
                  <div key={i} style={{
                    background: isOpen ? `${b.color}06` : "#0B0B1A",
                    border: `1.5px solid ${isOpen ? b.color + "35" : "#1A1A30"}`,
                    borderRadius: 12, overflow: "hidden", transition: "all 0.25s",
                    animation: `fadeUp 0.25s ease ${i * 0.06}s both`,
                  }}>
                    <button onClick={() => setExpandedBonus(isOpen ? null : i)} style={{
                      width: "100%", display: "flex", alignItems: "center", gap: 10,
                      padding: "12px 14px", background: "transparent", border: "none",
                      cursor: "pointer", textAlign: "left",
                    }}>
                      <span style={{ fontSize: 22 }}>{b.icon}</span>
                      <span style={{ fontSize: 14, fontWeight: 700, color: isOpen ? b.color : "#B8B8D0", flex: 1 }}>
                        {b.title}
                      </span>
                      <span style={{
                        color: "#44445A", fontSize: 14, transition: "transform 0.25s",
                        transform: isOpen ? "rotate(90deg)" : "rotate(0)",
                      }}>▶</span>
                    </button>
                    {isOpen && (
                      <div style={{ padding: "0 14px 14px", animation: "expandIn 0.2s ease" }}>
                        <p style={{ fontSize: 12.5, lineHeight: 1.65, color: "#AAAAC4", margin: "0 0 8px" }}>{b.content}</p>
                        {b.versus && (
                          <div style={{ background: "#08080F", borderRadius: 8, overflow: "hidden" }}>
                            {b.versus.map((v, j) => (
                              <div key={j} style={{
                                display: "grid", gridTemplateColumns: "1fr 1fr",
                                borderTop: j > 0 ? "1px solid #14142A" : "none",
                              }}>
                                <div style={{
                                  padding: "7px 10px", fontSize: 13,
                                  color: j === 0 ? "#FF922B" : "#8888A4",
                                  fontWeight: j === 0 ? 700 : 400,
                                  borderRight: "1px solid #14142A",
                                }}>{v.left}</div>
                                <div style={{
                                  padding: "7px 10px", fontSize: 13,
                                  color: j === 0 ? "#845EF7" : "#8888A4",
                                  fontWeight: j === 0 ? 700 : 400,
                                }}>{v.right}</div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ─── DAILY UPDATES ─── */}
        {activeTab === "updates" && (
          <div>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 16 }}>
              <div>
                <h2 style={{ fontSize: 18, fontWeight: 800, color: "#60A5FA", margin: "0 0 4px" }}>AI Industry Timeline</h2>
                <p style={{ color: "#8888A8", fontSize: 13, margin: 0 }}>Major releases and milestones — tap any card for details</p>
              </div>
              <button onClick={loadFeeds} style={{ padding: "6px 14px", borderRadius: 6, border: "1px solid #282840", background: "#0B0B1A", color: "#60A5FA", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0, marginTop: 2 }}>
                {feedLoading ? "Loading..." : "↻ Refresh Feeds"}
              </button>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16, justifyContent: "center" }}>
              {[
                { id: "all", label: "All", color: "#60A5FA" },
                { id: "anthropic", label: "Anthropic", color: "#D97706" },
                { id: "openai", label: "OpenAI", color: "#10A37F" },
                { id: "google", label: "Google", color: "#4285F4" },
                { id: "other", label: "Other", color: "#A78BFA" },
              ].map((f) => (
                <button key={f.id} onClick={() => { setFeedFilter(f.id); setOpenUpdate(null); }} style={{
                  padding: "7px 14px", borderRadius: 8, border: "none",
                  background: feedFilter === f.id ? f.color + "18" : "#0B0B1A",
                  color: feedFilter === f.id ? f.color : "#6A6A88",
                  fontSize: 13, fontWeight: 600, cursor: "pointer",
                  outline: feedFilter === f.id ? `1.5px solid ${f.color}45` : "1.5px solid #181832",
                }}>{f.label}</button>
              ))}
            </div>

            {openUpdateItem ? (
              <div style={{ animation: "expandIn 0.2s ease" }}>
                <button onClick={() => setOpenUpdate(null)} style={{ background: "none", border: "none", color: "#6A6A88", fontSize: 13, cursor: "pointer", marginBottom: 11, padding: 0, fontWeight: 600 }}>← Back to timeline</button>
                <div style={{ background: `${openUpdateItem.color}06`, border: `1.5px solid ${openUpdateItem.color}30`, borderRadius: 14, padding: "20px 18px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: openUpdateItem.color, background: openUpdateItem.color + "14", borderRadius: 5, padding: "2px 8px" }}>
                      {openUpdateItem.source === "anthropic" ? "Anthropic" : openUpdateItem.source === "openai" ? "OpenAI" : openUpdateItem.source === "google" ? "Google" : "Industry"}
                    </span>
                    <span style={{ fontSize: 12, fontWeight: 600, color: "#8888A8", background: "#141428", borderRadius: 5, padding: "2px 8px" }}>{openUpdateItem.tag}</span>
                    <span style={{ fontSize: 12, color: "#55557A", fontFamily: "'JetBrains Mono', monospace", marginLeft: "auto" }}>{openUpdateItem.date}</span>
                  </div>
                  <h3 style={{ fontSize: 18, fontWeight: 700, color: "#E0DEF0", margin: "0 0 12px" }}>{openUpdateItem.title}</h3>
                  <p style={{ fontSize: 14, lineHeight: 1.75, color: "#B0B0CA", margin: "0 0 16px" }}>{openUpdateItem.detail}</p>
                  <a href={openUpdateItem.link} target="_blank" rel="noopener noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 600, color: openUpdateItem.color, textDecoration: "none", background: openUpdateItem.color + "12", padding: "8px 14px", borderRadius: 8, border: `1px solid ${openUpdateItem.color}30` }}>
                    Read more →
                  </a>
                </div>
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(310px, 1fr))", gap: 8 }}>
                {filteredUpdates.map((item, i) => (
                  <div key={item.id} onClick={() => setOpenUpdate(item.id)} style={{
                    background: "#0B0B1A", border: "1px solid #181832",
                    borderLeft: `3px solid ${item.color}50`,
                    borderRadius: "0 11px 11px 0", padding: "13px 15px",
                    cursor: "pointer", transition: "all 0.15s",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: item.color, background: item.color + "14", borderRadius: 5, padding: "2px 7px" }}>
                        {item.source === "anthropic" ? "Anthropic" : item.source === "openai" ? "OpenAI" : item.source === "google" ? "Google" : "Industry"}
                      </span>
                      <span style={{ fontSize: 11, color: "#55557A", background: "#141428", borderRadius: 4, padding: "1px 6px" }}>{item.tag}</span>
                      <span style={{ fontSize: 11, color: "#44445A", marginLeft: "auto", fontFamily: "'JetBrains Mono', monospace" }}>{item.date}</span>
                    </div>
                    <div style={{ fontSize: 13.5, fontWeight: 600, color: "#D0D0E8", lineHeight: 1.4, marginBottom: 3 }}>{item.title}</div>
                    <div style={{ fontSize: 12, color: "#6A6A88", lineHeight: 1.45 }}>{item.desc}</div>
                  </div>
                ))}
              </div>
            )}

            <div style={{ marginTop: 24, borderTop: "1px solid #1E1E38", paddingTop: 18 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#6A6A88", textAlign: "center", marginBottom: 14 }}>Live from Official Blogs</div>
              {feedLoading ? (
                <div style={{ textAlign: "center", padding: "16px 0", color: "#55557A", fontSize: 13 }}>Fetching latest posts...</div>
              ) : (() => {
                let allItems = [];
                feedSources.forEach((src) => { if (feeds[src.id]) allItems = allItems.concat(feeds[src.id]); });
                allItems.sort((a, b) => new Date(b.date) - new Date(a.date));
                if (allItems.length === 0) return <div style={{ textAlign: "center", padding: "16px 0", color: "#55557A", fontSize: 13 }}>Live feeds unavailable — the curated timeline above has you covered.</div>;
                return (
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(310px, 1fr))", gap: 6 }}>
                    {allItems.slice(0, 10).map((item, i) => {
                      const d = item.date ? new Date(item.date).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
                      return (
                        <a key={i} href={item.link} target="_blank" rel="noopener noreferrer" style={{ background: "#0B0B1A", border: "1px solid #181832", borderLeft: `3px solid ${item.color}50`, borderRadius: "0 11px 11px 0", padding: "11px 14px", textDecoration: "none", display: "block" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                            <span style={{ fontSize: 11, fontWeight: 700, color: item.color, background: item.color + "14", borderRadius: 5, padding: "2px 7px" }}>{item.source}</span>
                            <span style={{ fontSize: 11, color: "#55557A", marginLeft: "auto" }}>{d}</span>
                          </div>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "#B0B0CA", lineHeight: 1.4 }}>{item.title}</div>
                        </a>
                      );
                    })}
                  </div>
                );
              })()}
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{
        maxWidth: 740, margin: "14px auto 0", padding: "14px",
        textAlign: "center",
      }}>
        <p style={{ fontSize: 12, lineHeight: 1.7, color: "#55557A", margin: 0 }}>
          <strong style={{ color: "#8888A4" }}>One sentence:</strong>{" "}
          <span style={{ color: "#E64980" }}>Agents</span> = <span style={{ color: "#FF6B6B" }}>LLM brain</span> + <span style={{ color: "#20C997" }}>Tool hands</span> + <span style={{ color: "#339AF0" }}>MCP plugs</span> + <span style={{ color: "#F59F00" }}>Skill guides</span> + <span style={{ color: "#38D9A9" }}>RAG memory</span>, all shaped by <span style={{ color: "#FF922B" }}>your prompts</span>.
        </p>
      </div>

      <style>{`
        @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        @keyframes expandIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }
        button:hover { filter: brightness(1.08); }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-bar { -ms-overflow-style: none; scrollbar-width: none; }
        * { box-sizing: border-box; }
        input[type=range] { height: 6px; border-radius: 3px; outline: none; -webkit-appearance: none; background: #1A1A35; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: currentColor; cursor: pointer; border: 2px solid #08080F; }
      `}</style>
    </div>
  );
}

function Pill({ c, children }) {
  return <span style={{
    background: `${c}12`, border: `1.5px solid ${c}40`, borderRadius: 20,
    padding: "6px 14px", fontSize: 13, fontWeight: 700, color: c, whiteSpace: "nowrap",
  }}>{children}</span>;
}
function Mini({ children }) {
  return <span style={{
    background: "#121228", border: "1px solid #222244", borderRadius: 14,
    padding: "3px 10px", fontSize: 10, color: "#6A6A88",
  }}>{children}</span>;
}
function Arr({ children }) {
  return <span style={{ fontSize: 11, color: "#3A3A54", padding: "1px 0" }}>{children}</span>;
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AIPlaybook));

</script>
</body>
