                      </span>
                      <span style={{
                        color: "#44445A", fontSize: 14, transition: "transform 0.25s",
                        transform: isOpen ? "rotate(90deg)" : "rotate(0)",
                      }}>▶</span>
                    </button>
                    {isOpen && (
                      <div style={{ padding: "0 14px 14px", animation: "expandIn 0.2s ease" }}>
                        <p style={{ fontSize: 12.5, lineHeight: 1.65, color: "#AAAAC4", margin: "0 0 8px" }}>{b.content}</p>
                        {b.versus && (
                          <div style={{ background: "#08080F", borderRadius: 8, overflow: "hidden" }}>
                            {b.versus.map((v, j) => (
                              <div key={j} style={{
                                display: "grid", gridTemplateColumns: "1fr 1fr",
                                borderTop: j > 0 ? "1px solid #14142A" : "none",
                              }}>
                                <div style={{
                                  padding: "7px 10px", fontSize: 13,
                                  color: j === 0 ? "#FF922B" : "#8888A4",
                                  fontWeight: j === 0 ? 700 : 400,
                                  borderRight: "1px solid #14142A",
                                }}>{v.left}</div>
                                <div style={{
                                  padding: "7px 10px", fontSize: 13,
                                  color: j === 0 ? "#845EF7" : "#8888A4",
                                  fontWeight: j === 0 ? 700 : 400,
                                }}>{v.right}</div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{
        maxWidth: 740, margin: "14px auto 0", padding: "14px",
        textAlign: "center",
      }}>
        <p style={{ fontSize: 12, lineHeight: 1.7, color: "#55557A", margin: 0 }}>
          <strong style={{ color: "#8888A4" }}>One sentence:</strong>{" "}
          <span style={{ color: "#E64980" }}>Agents</span> = <span style={{ color: "#FF6B6B" }}>LLM brain</span> + <span style={{ color: "#20C997" }}>Tool hands</span> + <span style={{ color: "#339AF0" }}>MCP plugs</span> + <span style={{ color: "#F59F00" }}>Skill guides</span> + <span style={{ color: "#38D9A9" }}>RAG memory</span>, all shaped by <span style={{ color: "#FF922B" }}>your prompts</span>.
        </p>
      </div>

      <style>{`
        @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        @keyframes expandIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }
        button:hover { filter: brightness(1.08); }
        * { box-sizing: border-box; }
        input[type=range] { height: 6px; border-radius: 3px; outline: none; -webkit-appearance: none; background: #1A1A35; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: currentColor; cursor: pointer; border: 2px solid #08080F; }
      `}</style>
    </div>
  );
}

function Pill({ c, children }) {
  return <span style={{
    background: `${c}12`, border: `1.5px solid ${c}40`, borderRadius: 20,
    padding: "6px 14px", fontSize: 13, fontWeight: 700, color: c, whiteSpace: "nowrap",
  }}>{children}</span>;
}
function Mini({ children }) {
  return <span style={{
    background: "#121228", border: "1px solid #222244", borderRadius: 14,
    padding: "3px 10px", fontSize: 10, color: "#6A6A88",
  }}>{children}</span>;
}
function Arr({ children }) {
  return <span style={{ fontSize: 11, color: "#3A3A54", padding: "1px 0" }}>{children}</span>;
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AIPlaybook));

</script>
</body>
</html>
