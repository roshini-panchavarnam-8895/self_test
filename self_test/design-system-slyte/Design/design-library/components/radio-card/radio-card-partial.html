<style>
    .rc-section { margin-bottom: 28px; }
    .rc-section-title { font-size: var(--zc-p2-font-size); font-weight: var(--zc-font-weight-bold); text-transform: uppercase; letter-spacing: 0.04em; color: var(--zc-color-huegrey-text-default); margin-bottom: 12px; }
    .rc-section-card { background: var(--zc-color-black-white-surface-white-surface); border: 1px solid var(--zc-color-huegrey-border-minimal); border-radius: var(--zc-radius-rl); padding: 24px; box-shadow: var(--zc-elevation-subtle-default); }
    .rc-table { width: 100%; border-collapse: collapse; }
    .rc-table th { text-align: left; font-size: var(--zc-p3-font-size); font-weight: var(--zc-font-weight-bold); color: var(--zc-color-huegrey-text-default); padding: 0 12px 12px 0; white-space: nowrap; }
    .rc-table td { padding: 10px 12px 10px 0; vertical-align: middle; }
    .rc-table tr + tr td { border-top: 1px solid var(--zc-color-huegrey-border-minimal); }
    .rc-table .rc-row-label { font-size: 13px; font-weight: var(--zc-font-weight-semibold); color: var(--zc-color-huegrey-text-dark); white-space: nowrap; min-width: 110px; }</style>

<div class="card-grid-header">
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
    <h1 class="card-grid-title">Radio Card</h1>
</div>

<!-- DEFAULT -->
<div class="rc-section">
    <div class="rc-section-title">Default (Unselected)</div>
    <div class="rc-section-card">
        <table class="rc-table">
            <thead>
                <tr>
                    <th>Size</th>
                    <th>Preview</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="rc-row-label">Default</td>
                    <td>
                        <div class="zc-radio-card">
                            <lyte-radiobutton name="demo-default">
                                <template is="registerYield" yield-name="yield">
                                    <span class="zc-radio-card-label">Option A</span>
                                </template>
                            </lyte-radiobutton>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td class="rc-row-label">Small</td>
                    <td>
                        <div class="zc-radio-card zc-radio-card-sm">
                            <lyte-radiobutton name="demo-default-sm">
                                <template is="registerYield" yield-name="yield">
                                    <span class="zc-radio-card-label">Option A</span>
                                </template>
                            </lyte-radiobutton>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- SELECTED -->

            </tbody>
        </table>
    </div>
</div>

<!-- WITH ICON -->

            </tbody>
        </table>
