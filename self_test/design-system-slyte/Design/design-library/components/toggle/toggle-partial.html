<style>

    .tgl-table { width: 100%; border-collapse: collapse; }

<div class="card-grid-header">
    <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
    <h1 class="card-grid-title">Toggle</h1>
</div>

<p class="tgl-desc">Source: Figma <code>Toggle (2359:348)</code>. Selectable pill / chip with circle indicator + label. Click to toggle on/off. 5 sizes &times; 3 radii &times; 3 types &times; 6 color states.</p>

<!-- CLICK TO TOGGLE -->
<div class="tgl-section">
    <div class="tgl-section-title">Click to toggle</div>
    <div class="tgl-section-card">
        <div class="zc-flex zc-align-items-center zc-gap-16 zc-row-wrap">
            <lyte-checkbox lt-prop-type="switch" class="zc-toggle">
                <template is="registerYield" yield-name="yield"><span>Label</span></template>
            </lyte-checkbox>
            <lyte-checkbox lt-prop-type="switch" lt-prop-checked="true" class="zc-toggle">
                <template is="registerYield" yield-name="yield"><span>Label</span></template>
            </lyte-checkbox>
            <lyte-checkbox lt-prop-type="switch" class="zc-toggle zc-toggle-success">
                <template is="registerYield" yield-name="yield"><span>Label</span></template>

            <lyte-checkbox lt-prop-type="switch" lt-prop-checked="true" class="zc-toggle zc-toggle-success">

    </div>
</div>
